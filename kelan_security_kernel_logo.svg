
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 160" width="100%" height="100%">
            
        <defs>
          <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#10b981" />
            <stop offset="100%" stop-color="#059669" />
          </linearGradient>
          <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#10b981" />
            <stop offset="100%" stop-color="#34d399" />
          </linearGradient>
          <linearGradient id="shieldBgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0d1527" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#020617" stop-opacity="0.95" />
          </linearGradient>
          <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFFFFF" />
            <stop offset="100%" stop-color="#34d399" />
          </linearGradient>
          <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
          </filter>
          <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComponentTransfer in="blur" result="boost">
              <feFuncA type="linear" slope="1.5"/>
            </feComponentTransfer>
            <feMerge>
              <feMergeNode in="boost" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>
      
            <g transform="translate(10, 0)">
              
            <polygon 
              points="80,24 125,40 125,100 80,136 35,100 35,40" 
              fill="none" 
              stroke="url(#shieldGradient)" 
              stroke-width="2.5"
              stroke-linejoin="round"
              filter="url(#glowFilter)"
            />
            <polygon 
              points="80,24 125,40 125,100 80,136 35,100 35,40" 
              fill="url(#shieldBgGrad)" 
              stroke="url(#shieldGradient)" 
              stroke-width="2.5"
              stroke-linejoin="round"
            />
            <path 
              d="M 55,60 C 55,50 80,45 80,65 C 80,85 105,80 105,70" 
              fill="none" 
              stroke="#34d399" 
              stroke-width="3" 
              stroke-linecap="round" 
            />
            <path 
              d="M 55,80 C 55,90 80,95 80,75 C 80,55 105,60 105,90" 
              fill="none" 
              stroke="url(#coreGradient)" 
              stroke-width="3" 
              stroke-linecap="round" 
            />
            <circle 
              cx="80" 
              cy="70" 
              r="6.5" 
              fill="#10b981"
              filter="url(#innerGlow)"
            />
            <circle cx="80" cy="70" r="3" fill="#ffffff" />
          
            </g>
            <g transform="translate(195, 0)">
              
            <text x="0" y="82" font-family="'Plus Jakarta Sans', system-ui" font-weight="800" font-size="44" fill="url(#textGradient)" letter-spacing="0.05em">KELAN</text>
            <text x="0" y="112" font-family="'JetBrains Mono', monospace" font-weight="600" font-size="16" fill="#10b981" letter-spacing="0.44em">SECURITY</text>
          
            </g>
          </svg>
        